<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">DevLog</title>
  <desc id="desc">Default social share image for DevLog.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ea6c9"/>
      <stop offset="100%" stop-color="#4e79a7"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a4e8a"/>
      <stop offset="100%" stop-color="#5da5d8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="120" y="120" width="960" height="390" fill="#ece9d8" stroke="#6b6b6b" stroke-width="2"/>
  <rect x="122" y="122" width="956" height="42" fill="url(#bar)"/>
  <text x="150" y="150" font-family="Tahoma, Segoe UI, sans-serif" font-size="20" fill="#ffffff">DevLog</text>
  <text x="170" y="300" font-family="Tahoma, Segoe UI, sans-serif" font-size="92" fill="#1a1a1a">Developer Blog</text>
  <text x="170" y="360" font-family="Tahoma, Segoe UI, sans-serif" font-size="38" fill="#3f3f3f">Notes on programming, tooling, and shipping</text>
</svg>
