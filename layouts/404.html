{{ define "main" }}
<section class="post">
  <header class="post-header">
    <h1>404: Page Not Found</h1>
    <p class="meta">The page you requested does not exist or has moved.</p>
  </header>

  <section class="content">
    <p>Try one of these pages:</p>
    <ul>
      <li><a href="{{ site.Home.RelPermalink }}">Home</a></li>
      <li><a href="{{ "posts/" | relURL }}">Posts</a></li>
      <li><a href="{{ "about/" | relURL }}">About</a></li>
    </ul>
  </section>
</section>
{{ end }}
