<footer class="site-footer">
  <div class="container footer-inner">
    <p>© {{ now.Year }} {{ site.Params.author }}.</p>
    <ul class="socials">
      {{ with site.Params.github }}<li><a href="{{ . }}" target="_blank" rel="noopener noreferrer">GitHub</a></li>{{ end }}
      {{ with site.Params.x }}<li><a href="{{ . }}" target="_blank" rel="noopener noreferrer">X</a></li>{{ end }}
    </ul>
  </div>
</footer>
