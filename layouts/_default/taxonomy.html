{{ define "main" }}
<section>
  <h1>#{{ .Title }}</h1>
  <div class="post-list">
    {{ range .Pages }}
      <article class="card">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="meta">{{ .Date.Format "Jan 2, 2006" }}</p>
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
